<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Little Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: #e3f2fd; /* Màu nền xanh nhạt như trong ảnh */
            font-family: 'Press Start 2P', cursive;
            overflow: hidden;
            text-align: center;
        }

        .container {
            position: relative;
            z-index: 10;
        }

        .hearts {
            color: #c62828;
            font-size: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: #b71c1c;
            font-size: 3rem;
            margin: 10px 0;
            text-transform: uppercase;
        }

        p {
            color: #b71c1c;
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .buttons {
            display: flex;
            gap: 50px;
            justify-content: center;
            align-items: center;
        }

        button {
            padding: 15px 30px;
            font-family: 'Press Start 2P', cursive;
            font-size: 18px;
            cursor: pointer;
            border: 4px solid #000;
            background-color: #bdbdbd;
            box-shadow: inset -4px -4px 0px #757575, inset 4px 4px 0px #eeeeee;
        }

        button:active {
            box-shadow: inset 4px 4px 0px #757575;
        }

        #no-btn {
            position: absolute;
            transition: 0.1s;
        }

        /* Trang trí pixel ở góc */
        .pixel-decor {
            position: absolute;
            color: #b71c1c;
            font-size: 40px;
        }

        #lyric-container {
            display: none;
            margin-top: 30px;
            color: #2e7d32;
            font-size: 12px;
            max-width: 80%;
        }
    </style>
</head>
<body>

    <div class="pixel-decor" style="top: 10%; left: 10%;">✦</div>
    <div class="pixel-decor" style="top: 20%; left: 8%;">✦</div>
    <div class="pixel-decor" style="bottom: 15%; left: 12%;">✦</div>
    <div class="pixel-decor" style="top: 50%; right: 5%;">✦</div>

    <div class="container">
        <div class="hearts">♥♥♥♥♥</div>
        <h1>HI, LOVE!</h1>
        <p>DO YOU WANT TO SEE A LITTLE<br>SURPRISE I MADE FOR YOU?</p>

        <div class="buttons">
            <button id="yes-btn">Yes</button>
            <button id="no-btn">No</button>
        </div>

        <div id="lyric-container">
            <p>🎶 Đang phát bản nhạc tình yêu của bạn... 🎶</p>
            <div id="lyrics"></div>
        </div>
    </div>

    <audio id="love-audio">
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        const audio = document.getElementById('love-audio');
        const lyricContainer = document.getElementById('lyric-container');

        // Hàm di chuyển nút NO ngẫu nhiên
        noBtn.addEventListener('mouseover', () => {
            const x = Math.random() * (window.innerWidth - noBtn.offsetWidth);
            const y = Math.random() * (window.innerHeight - noBtn.offsetHeight);
            
            noBtn.style.left = `${x}px`;
            noBtn.style.top = `${y}px`;
        });

        // Khi nhấn nút YES
        yesBtn.addEventListener('click', () => {
            alert('Yay! I love you! ❤️');
            noBtn.style.display = 'none';
            lyricContainer.style.display = 'block';
            audio.play();
            
            // Giả lập chạy lyric
            const lyrics = ["You are my sunshine...", "My only sunshine...", "You make me happy...", "When skies are gray..."];
            let i = 0;
            const lyricBox = document.getElementById('lyrics');
            
            setInterval(() => {
                if(i < lyrics.length) {
                    lyricBox.innerHTML = `<p style="color: #d32f2f">${lyrics[i]}</p>`;
                    i++;
                }
            }, 3000);
        });
    </script>
</body>
</html>
